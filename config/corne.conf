# Deaktiviert USB-Logging (das blockiert oft die Erkennung unter Windows)
CONFIG_ZMK_USB_LOGGING=n

# Erzwingt die stabile USB-Erkennung als Standard-Tastatur
CONFIG_ZMK_USB=y

# Bluetooth-Signal für Windows optimieren
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Bildschirm und LEDs für den SuperMini aktivieren
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
